<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>침착맨 메가트렌드</title>
<style>
 html,body{margin:0;height:100%;font-family:'Pretendard','Malgun Gothic',sans-serif;background:#f6f7f9}
 .nav{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#1e1b4b;color:#fff;
       position:sticky;top:0;z-index:10}
 .nav .t{font-weight:800;font-size:15px;margin-right:auto}
 .nav button,.nav select{font-size:13px;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;
       background:#4f46e5;color:#fff;font-weight:600}
 .nav select{background:#fff;color:#1f2329}
 .nav button:disabled{opacity:.35;cursor:default}
 .cur{font-size:13px;color:#c7d2fe;min-width:92px;text-align:center}
 iframe{width:100%;height:calc(100vh - 49px);border:none;background:#f6f7f9}
</style></head><body>
<div class="nav">
 <span class="t">🔥 침착맨 메가트렌드</span>
 <button id="prev">◀ 이전</button>
 <span class="cur" id="cur"></span>
 <button id="next">다음 ▶</button>
 <select id="sel"><option value="2026-06-26">2026-06-26</option><option value="2026-06-24">2026-06-24</option><option value="2026-06-23">2026-06-23</option><option value="2026-06-19">2026-06-19</option></select>
</div>
<iframe id="f"></iframe>
<script>
 const DATES = ["2026-06-26", "2026-06-24", "2026-06-23", "2026-06-19"];            // 최신순
 let idx = 0;
 function show(i){
   idx = Math.max(0, Math.min(DATES.length-1, i));
   document.getElementById('f').src = 'r/' + DATES[idx] + '.html';
   document.getElementById('cur').textContent = DATES[idx];
   document.getElementById('sel').value = DATES[idx];
   document.getElementById('next').disabled = (idx<=0);          // 다음=더 최신
   document.getElementById('prev').disabled = (idx>=DATES.length-1); // 이전=더 과거
 }
 document.getElementById('prev').onclick = ()=>show(idx+1);
 document.getElementById('next').onclick = ()=>show(idx-1);
 document.getElementById('sel').onchange = (e)=>show(DATES.indexOf(e.target.value));
 show(0);
</script></body></html>
